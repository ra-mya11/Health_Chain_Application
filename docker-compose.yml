version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=healthcare
    networks:
      - healthcare-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: healthcare-ml-service
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - healthcare-network
    depends_on:
      - mongodb

  backend:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: healthcare-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/healthcare
      - JWT_SECRET=your_jwt_secret_key
      - ML_SERVICE_URL=http://ml-service:8000
      - NODE_ENV=production
    networks:
      - healthcare-network
    depends_on:
      - mongodb
      - ml-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_ML_API_URL=http://localhost:8000
    networks:
      - healthcare-network
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  healthcare-network:
    driver: bridge
